# Provider extensions publish the live model list and model metadata at
# runtime. Harness config owns role defaults and extension settings.
# Use `/model <role>` to switch and `/role ...` to edit persisted role
# overrides.

# Optional prompt fragments applied to every role. Fragments are rendered as
# Handlebars templates and sorted by priority together with role-, tool-, and
# extension-provided fragments. Priorities below 100 render before generated
# context such as skills and AGENTS.md.
# promptFragments:
#   - name: user.short-plain-style
#     priority: 65
#     text: Keep answers short and plain, using only simple words.

# Optional startup role. If omitted, Tau starts on the first role in
# `roleGroups` order. If the named role is missing, Tau warns and falls back to
# that first role.
# defaultRole: senior-engineer

# Optional grouped role defaults. Role names are globally unique across all
# groups. Tab cycles between groups; Shift-Tab cycles within the selected
# role's group. Group-level fields are defaults for every role in `roles`.
# `description` is shown in `/role ...` completions. `compactionThreshold`
# sets the context-window percentage (0-100) where automatic compaction starts.
# Per-role `promptFragments` add instructions only for that role.
# `promptOverride` selects a system prompt template. `tools` and `disableTools`
# customize internal tool availability for the role.
# roleGroups:
#   engineer:
#     promptFragments:
#       - name: engineer.careful
#         priority: 80
#         text: You are a careful coding agent.
#     roles:
#       junior-engineer:
#         effort: low
#       senior-engineer:
#         description: Balanced coding engineer.
#         model: chatgpt/gpt-5.5
#         compactionThreshold: 85
#         tools: [read, grep]
#         disableTools: [shell]
#       staff-engineer:
#         effort: xhigh
#       old-role:
#         enable: false  # hide a lower-layer or built-in role

# Optional built-in extension overrides.
# extensions:
#   core-shell:
#     enable: false
#   provider-builtin:
#     enable: false
#   test-dummy:
#     enable: true
#   std-email:
#     enable: true
#     # Secret names may contain ASCII letters, digits, '.', '_' and '-'.
#     # Values come from <state_dir>/secrets/<name>.yaml or one-shot
#     # TAU_SECRET_<NAME> environment variables (suffixes are lowercased and
#     # removed from the harness environment after startup).
#     secrets:
#       personal_mail_password: {}        # required by default
#       backup_mail_password:
#         optional: true                  # omit when no value is configured
#     config:
#       enable: true
#       accounts:
#         - id: personal
#           enable: true
#           from: "Me <me@example.com>"
#           imap: { host: imap.example.com, login: me@example.com }
#           smtp: { host: smtp.example.com, login: me@example.com }
#           auth:
#             method: password
#             # Replace legacy auth.password_env/auth.command/password_command
#             # with auth.password_secret plus the declaration above.
#             password_secret: personal_mail_password
{}
