# Built-in CLI key bindings. Merged underneath user bindings in
# `cli.yaml` so unmentioned keys stay bound to these defaults.
# Keep docs/cli-keybindings.md in sync when changing defaults/actions.
#
# `command` is optional — navigation actions like `prompt-previous`
# and `prompt-next` don't shell out, so they omit it entirely.
C-f:
  action: shell-prompt-insert
  command: >-
    rg --files --hidden --glob '!.git' | fzf --height=100%
  trim: true
Tab:
  action: role-cycle
C-r:
  action: prompt-history-search
  command: >-
    fzf --height=100% --delimiter='\t' --with-nth=2 --no-hscroll --preview 'cat "$TAU_PROMPT_HISTORY_DIR"/{1}' --preview-window 'right,60%,wrap' | cut -f1
  trim: true
C-t:
  action: shell-prompt-insert
  command: >-
    RG_PREFIX='rg --line-number --column --no-heading --color=always --smart-case'; fzf --height=100% --ansi --disabled --bind "change:reload:$RG_PREFIX {q} || true" --delimiter : --preview 'bat --color=always --style=numbers --highlight-line {2} -- {1} 2>/dev/null || awk -v line={2} '\''line - 4 <= NR && NR <= line + 4 { printf "%6d  %s\n", NR, $0 }'\'' -- {1}' --preview-window '+{2}/2' | cut -d: -f1
  trim: true
C-k:
  action: prompt-previous
C-Up:
  action: prompt-previous
C-j:
  action: prompt-next
C-Down:
  action: prompt-next
C-z:
  action: prompt-undo
C-y:
  action: shell-prompt-insert
  command: >-
    if command -v jj >/dev/null 2>&1 && jj root --ignore-working-copy >/dev/null 2>&1; then jj log -r '::@' --no-graph -T 'change_id.shortest(8) ++ "\t" ++ description.first_line() ++ "\n"' | awk 'BEGIN { OFS="\t" } { id=$0; sub(/\t.*/, "", id); title=$0; sub(/^[^\t]*\t?/, "", title); if (title == "") title="(no description set)"; if (length(title) < 81) short=title; else short=substr(title, 1, 77) "..."; print id, short }' | fzf --height=100% --delimiter='\t' --with-nth=2 --preview 'jj show --color=always {1}' --preview-window 'right,50%,wrap' | cut -f1; elif command -v git >/dev/null 2>&1 && git rev-parse --is-inside-work-tree >/dev/null 2>&1; then git log --format='%h%x09%s' | awk 'BEGIN { OFS="\t" } { id=$0; sub(/\t.*/, "", id); title=$0; sub(/^[^\t]*\t?/, "", title); if (title == "") title="(no description set)"; if (length(title) < 81) short=title; else short=substr(title, 1, 77) "..."; print id, short }' | fzf --height=100% --delimiter='\t' --with-nth=2 --preview 'git show --color=always {1}' --preview-window 'right,50%,wrap' | cut -f1; fi
  trim: true
C-o:
  action: shell-prompt-edit
  command: >-
    $TAU_EDITOR "$TAU_PROMPT_PATH"
C-g:
  action: shell-prompt-edit
  command: >-
    $TAU_EDITOR "$TAU_PROMPT_PATH"
